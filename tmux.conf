# Mac keyboard in Kali/Parallels:
# - Control is reliable and becomes the tmux prefix.
# - Option should be sent as Alt/Meta by Parallels for the M-* bindings below.
# - Command is intentionally left for macOS/Parallels shortcuts.

unbind-key C-b
set -g prefix C-space
bind-key C-space send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g escape-time 10
set -g focus-events on
set -g xterm-keys on
setw -g mode-keys vi

# New windows and panes open where you already are.
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Prefix helpers.
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind-key Space last-window
bind-key x kill-pane
bind-key X kill-window
bind-key S choose-tree -Zw
bind-key C-s new-session

# Option/Alt navigation. In Parallels, set Option to send Alt/Meta to the VM.
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-Left select-pane -L
bind-key -n M-Down select-pane -D
bind-key -n M-Up select-pane -U
bind-key -n M-Right select-pane -R
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Option/Alt resizing. Hold Control too when you want to resize instead of move.
bind-key -n C-M-h resize-pane -L 5
bind-key -n C-M-j resize-pane -D 2
bind-key -n C-M-k resize-pane -U 2
bind-key -n C-M-l resize-pane -R 5

# Clipboard: vi copy-mode selections go to the tmux buffer and the Kali clipboard.
# With Parallels clipboard sharing enabled, that clipboard is available on macOS too.
set -s set-clipboard on
set -s copy-command 'xclip -selection clipboard -in'
bind-key [ copy-mode
bind-key ] paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

# List of plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf).
run '~/.tmux/plugins/tpm/tpm'